---
layout: default
---

<div class="page-header">
  <div class="container">
    <h1 class="page-header__title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-header__subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</div>

<div class="page-content">
  <div class="container container--narrow">
    {{ content }}
  </div>
</div>
