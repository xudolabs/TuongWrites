- id: nomenclator-chronicles
  title: "The Nomenclator Chronicles"
  genre: "Historical Fiction / Adventure / Mystery"
  tagline: "Can freedom exist outside the law, or does every revolution eventually replicate the tyranny it escaped?"
  description: "Across 225 years, a cipher manuscript passes from hand to hand — from the slave markets of Algiers to the pirate republics of Nassau, from the jungles of Panama to the South China Sea. Each book follows a different protagonist who discovers the Nomenclator, decodes fragments from previous eras, adds their own testimony, and passes it on."
