- id: thousand-li-of-shadows
  title: "The Thousand Li of Shadows"
  genre: "Historical Fiction / Mystery / Epic"
  tagline: "The hidden stories that shaped the world — the ones that never made it into the histories, because the people who knew them vanished along the road."
  description: "Across sixteen centuries, the Silk Road carried more than silk and spices — it carried secrets. Each book unearths a different untold mystery of the ancient trade routes: lost cities swallowed by desert, letters that never arrived, libraries burned to ash, plagues unleashed by greed, and civilizations erased from history."
  artifact: "A jade-and-bronze merchant's seal belonging to a Sogdian trading house — passed from hand to hand, stolen, buried, recovered, and carried forward across five books."
  status: "In progress"
  color: "silk"
  book_count: 5
