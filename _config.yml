title: Tuong Do
description: "Historical fiction, leadership, and stories of the people history tried to forget."
author: Tuong Do
url: "https://xudolabs.github.io"
baseurl: "/TuongWrites"

# Build
markdown: kramdown
permalink: /books/:slug/
sass:
  style: compressed
  sass_dir: _sass

# Collections
collections:
  books:
    output: true
    permalink: /books/:slug/
  series:
    output: true
    permalink: /series/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "books"
    values:
      layout: "book"
  - scope:
      path: ""
      type: "series"
    values:
      layout: "series"
  - scope:
      path: ""
    values:
      layout: "default"

# Data
author_info:
  name: Tuong Do
  photo: /assets/images/tuong-do.jpeg
  linkedin: https://www.linkedin.com/in/tuongdo/
  website: https://catchinglightninginabottle.com/

# Exclude
exclude:
  - README.md
  - cover-art-prompts.md
  - index-tailwind.html
  - node_modules
  - "*.py"
