<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2d1b0e"/>
      <stop offset="40%" stop-color="#1a3a2e"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b65e"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a8873a"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.55" r="0.5">
      <stop offset="0%" stop-color="rgba(180,50,30,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="400" height="600" fill="url(#bg2)" rx="4"/>
  <rect width="400" height="600" fill="url(#glow2)"/>

  <!-- Decorative border -->
  <rect x="16" y="16" width="368" height="568" rx="2" fill="none" stroke="url(#gold2)" stroke-width="0.8" opacity="0.5"/>
  <rect x="22" y="22" width="356" height="556" rx="2" fill="none" stroke="url(#gold2)" stroke-width="0.3" opacity="0.3"/>

  <!-- Jungle canopy silhouette -->
  <g opacity="0.1" fill="#2a5a2a">
    <path d="M0,380 L20,340 L35,370 L50,320 L70,360 L85,310 L100,350 L120,300 L140,340 L155,290 L170,330 L190,280 L210,320 L225,290 L240,340 L260,300 L280,350 L295,310 L310,360 L330,320 L350,370 L365,330 L380,360 L400,310 L400,480 L0,480Z"/>
  </g>

  <!-- Crossed cutlasses -->
  <g transform="translate(200,250)" opacity="0.12" stroke="#c9a84c" stroke-width="2" fill="none">
    <line x1="-60" y1="-50" x2="60" y2="50"/>
    <line x1="60" y1="-50" x2="-60" y2="50"/>
    <circle cx="-60" cy="-50" r="8"/>
    <circle cx="60" cy="-50" r="8"/>
  </g>

  <!-- Blood drip motif -->
  <g opacity="0.15" fill="#8b2020">
    <ellipse cx="140" cy="395" rx="2" ry="12"/>
    <ellipse cx="200" cy="400" rx="2" ry="15"/>
    <ellipse cx="260" cy="392" rx="2" ry="10"/>
    <circle cx="140" cy="410" r="3"/>
    <circle cx="200" cy="418" r="4"/>
    <circle cx="260" cy="405" r="3"/>
  </g>

  <!-- Series label -->
  <text x="200" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9a84c" letter-spacing="4" opacity="0.8">THE NOMENCLATOR CHRONICLES</text>
  <line x1="60" y1="82" x2="340" y2="82" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>

  <!-- Book number -->
  <text x="200" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c9a84c" letter-spacing="6" opacity="0.5">BOOK TWO</text>

  <!-- Title -->
  <text x="200" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#e8e0d0" letter-spacing="2">THE</text>
  <text x="200" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#e8e0d0" letter-spacing="2">BLEEDING</text>
  <text x="200" y="261" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#e8e0d0" letter-spacing="2">COAST</text>

  <!-- Decorative compass rose -->
  <g transform="translate(200,310)" opacity="0.4" stroke="#c9a84c" stroke-width="1" fill="none">
    <circle r="12"/>
    <line x1="0" y1="-18" x2="0" y2="18"/>
    <line x1="-18" y1="0" x2="18" y2="0"/>
    <line x1="-12" y1="-12" x2="12" y2="12"/>
    <line x1="12" y1="-12" x2="-12" y2="12"/>
    <polygon points="0,-16 3,-5 -3,-5" fill="#c9a84c" opacity="0.6"/>
  </g>

  <!-- Era -->
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#c9a84c" letter-spacing="3" opacity="0.7">1668 — 1669</text>
  <text x="200" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9a84c" letter-spacing="2" opacity="0.5">CARIBBEAN</text>

  <!-- Author -->
  <line x1="120" y1="535" x2="280" y2="535" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="558" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#e8e0d0" letter-spacing="4" opacity="0.9">TUONG DO</text>

  <rect x="0" y="0" width="6" height="600" fill="rgba(0,0,0,0.3)" rx="4 0 0 4"/>
</svg>
