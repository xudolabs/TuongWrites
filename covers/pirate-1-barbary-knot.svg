<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="40%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b65e"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a8873a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="rgba(201,168,76,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <clipPath id="border1">
      <rect x="8" y="8" width="384" height="584" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg1)" rx="4"/>
  <rect width="400" height="600" fill="url(#glow1)"/>

  <!-- Decorative border -->
  <rect x="16" y="16" width="368" height="568" rx="2" fill="none" stroke="url(#gold1)" stroke-width="0.8" opacity="0.5"/>
  <rect x="22" y="22" width="356" height="556" rx="2" fill="none" stroke="url(#gold1)" stroke-width="0.3" opacity="0.3"/>

  <!-- Mediterranean waves -->
  <g opacity="0.12" stroke="#c9a84c" stroke-width="1" fill="none">
    <path d="M0,420 Q50,410 100,420 Q150,430 200,420 Q250,410 300,420 Q350,430 400,420"/>
    <path d="M0,435 Q50,425 100,435 Q150,445 200,435 Q250,425 300,435 Q350,445 400,435"/>
    <path d="M0,450 Q50,440 100,450 Q150,460 200,450 Q250,440 300,450 Q350,460 400,450"/>
    <path d="M0,465 Q50,455 100,465 Q150,475 200,465 Q250,455 300,465 Q350,475 400,465"/>
  </g>

  <!-- Maltese Cross (stylized) -->
  <g transform="translate(200,240)" opacity="0.15" fill="#c9a84c">
    <polygon points="0,-80 15,-25 80,0 15,25 0,80 -15,25 -80,0 -15,-25"/>
    <polygon points="0,-60 10,-18 60,0 10,18 0,60 -10,18 -60,0 -10,-18" fill="#0d2137"/>
    <polygon points="0,-45 8,-14 45,0 8,14 0,45 -8,14 -45,0 -8,-14" fill="#c9a84c" opacity="0.5"/>
  </g>

  <!-- Chain links (slavery/captivity motif) -->
  <g opacity="0.1" stroke="#c9a84c" stroke-width="1.5" fill="none">
    <ellipse cx="120" cy="350" rx="12" ry="8"/>
    <ellipse cx="144" cy="350" rx="12" ry="8"/>
    <ellipse cx="168" cy="350" rx="12" ry="8"/>
    <ellipse cx="192" cy="350" rx="12" ry="8"/>
    <ellipse cx="216" cy="350" rx="12" ry="8"/>
    <ellipse cx="240" cy="350" rx="12" ry="8"/>
    <ellipse cx="264" cy="350" rx="12" ry="8"/>
    <ellipse cx="288" cy="350" rx="12" ry="8"/>
  </g>

  <!-- Series label -->
  <text x="200" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9a84c" letter-spacing="4" opacity="0.8">THE NOMENCLATOR CHRONICLES</text>
  <line x1="60" y1="82" x2="340" y2="82" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>

  <!-- Book number -->
  <text x="200" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c9a84c" letter-spacing="6" opacity="0.5">BOOK ONE</text>

  <!-- Title -->
  <text x="200" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#e8e0d0" letter-spacing="2">THE</text>
  <text x="200" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#e8e0d0" letter-spacing="2">BARBARY</text>
  <text x="200" y="261" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#e8e0d0" letter-spacing="2">KNOT</text>

  <!-- Decorative knot symbol -->
  <g transform="translate(200,310)" opacity="0.6" stroke="#c9a84c" stroke-width="1.5" fill="none">
    <path d="M-20,0 C-20,-15 -5,-15 0,0 C5,15 20,15 20,0 C20,-15 5,-15 0,0 C-5,15 -20,15 -20,0"/>
  </g>

  <!-- Era -->
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#c9a84c" letter-spacing="3" opacity="0.7">1585 — 1588</text>
  <text x="200" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9a84c" letter-spacing="2" opacity="0.5">MEDITERRANEAN</text>

  <!-- Author -->
  <line x1="120" y1="535" x2="280" y2="535" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="558" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#e8e0d0" letter-spacing="4" opacity="0.9">TUONG DO</text>

  <!-- Spine effect -->
  <rect x="0" y="0" width="6" height="600" fill="rgba(0,0,0,0.3)" rx="4 0 0 4"/>
</svg>
