<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="sbg2" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="40%" stop-color="#4a2c17"/>
      <stop offset="100%" stop-color="#2d1b0e"/>
    </linearGradient>
    <linearGradient id="copper2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#c44e2e"/>
      <stop offset="100%" stop-color="#a8573a"/>
    </linearGradient>
    <radialGradient id="sglow2" cx="0.5" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="rgba(212,165,116,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="400" height="600" fill="url(#sbg2)" rx="4"/>
  <rect width="400" height="600" fill="url(#sglow2)"/>

  <rect x="16" y="16" width="368" height="568" rx="2" fill="none" stroke="url(#copper2)" stroke-width="0.8" opacity="0.5"/>
  <rect x="22" y="22" width="356" height="556" rx="2" fill="none" stroke="url(#copper2)" stroke-width="0.3" opacity="0.3"/>
  <g opacity="0.3" stroke="#d4a574" stroke-width="0.8" fill="none">
    <path d="M30,30 L50,30 L50,50"/>
    <path d="M30,30 L30,50 L50,50"/>
    <path d="M370,30 L350,30 L350,50"/>
    <path d="M370,30 L370,50 L350,50"/>
    <path d="M30,570 L50,570 L50,550"/>
    <path d="M30,570 L30,550 L50,550"/>
    <path d="M370,570 L350,570 L350,550"/>
    <path d="M370,570 L370,550 L350,550"/>
  </g>

  <!-- Monastery/stupa silhouette -->
  <g transform="translate(200,290)" opacity="0.12" fill="#d4a574">
    <!-- Main stupa -->
    <rect x="-30" y="10" width="60" height="40"/>
    <polygon points="-35,10 0,-30 35,10"/>
    <circle cx="0" cy="-30" r="8"/>
    <!-- Spire -->
    <line x1="0" y1="-38" x2="0" y2="-55" stroke="#d4a574" stroke-width="2"/>
    <circle cx="0" cy="-55" r="3"/>
    <!-- Side structures -->
    <rect x="-60" y="25" width="25" height="25"/>
    <polygon points="-62,25 -48,10 -33,25"/>
    <rect x="35" y="25" width="25" height="25"/>
    <polygon points="33,25 48,10 62,25"/>
  </g>

  <!-- Mountains (Afghanistan/Central Asia) -->
  <g opacity="0.06" fill="#d4a574">
    <polygon points="0,420 60,360 120,400 180,340 240,380 300,350 360,390 400,370 400,460 0,460"/>
  </g>

  <!-- Buddhist wheel (dharma) -->
  <g transform="translate(200,370)" opacity="0.15" stroke="#d4a574" stroke-width="1" fill="none">
    <circle r="18"/>
    <circle r="5"/>
    <line x1="0" y1="-18" x2="0" y2="18"/>
    <line x1="-18" y1="0" x2="18" y2="0"/>
    <line x1="-13" y1="-13" x2="13" y2="13"/>
    <line x1="13" y1="-13" x2="-13" y2="13"/>
  </g>

  <!-- Flame motif (destruction) -->
  <g opacity="0.08" fill="#c44e2e">
    <path d="M160,420 Q165,400 170,420 Q175,405 180,420"/>
    <path d="M220,415 Q225,395 230,415 Q235,400 240,415"/>
  </g>

  <text x="200" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d4a574" letter-spacing="3" opacity="0.8">THE THOUSAND LI OF SHADOWS</text>
  <line x1="60" y1="77" x2="340" y2="77" stroke="#d4a574" stroke-width="0.5" opacity="0.4"/>

  <text x="200" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#d4a574" letter-spacing="6" opacity="0.5">BOOK TWO</text>

  <text x="200" y="162" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#f0e6d8" letter-spacing="2">THE</text>
  <text x="200" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#f0e6d8" letter-spacing="1">MONASTERY AT</text>
  <text x="200" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#f0e6d8" letter-spacing="1">THE END OF</text>
  <text x="200" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#f0e6d8" letter-spacing="1">THE WORLD</text>

  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#d4a574" letter-spacing="3" opacity="0.7">629 — 751 CE</text>
  <text x="200" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#d4a574" letter-spacing="2" opacity="0.5">CENTRAL ASIA &amp; INDIA</text>

  <line x1="120" y1="535" x2="280" y2="535" stroke="#d4a574" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="558" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#f0e6d8" letter-spacing="4" opacity="0.9">TUONG DO</text>

  <rect x="0" y="0" width="6" height="600" fill="rgba(0,0,0,0.3)" rx="4 0 0 4"/>
</svg>
