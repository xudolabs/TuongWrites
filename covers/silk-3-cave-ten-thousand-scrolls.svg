<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="sbg3" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2d2a20"/>
      <stop offset="40%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </linearGradient>
    <linearGradient id="copper3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#c44e2e"/>
      <stop offset="100%" stop-color="#a8573a"/>
    </linearGradient>
    <radialGradient id="sglow3" cx="0.5" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="rgba(212,165,116,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="400" height="600" fill="url(#sbg3)" rx="4"/>
  <rect width="400" height="600" fill="url(#sglow3)"/>

  <rect x="16" y="16" width="368" height="568" rx="2" fill="none" stroke="url(#copper3)" stroke-width="0.8" opacity="0.5"/>
  <rect x="22" y="22" width="356" height="556" rx="2" fill="none" stroke="url(#copper3)" stroke-width="0.3" opacity="0.3"/>
  <g opacity="0.3" stroke="#d4a574" stroke-width="0.8" fill="none">
    <path d="M30,30 L50,30 L50,50"/>
    <path d="M30,30 L30,50 L50,50"/>
    <path d="M370,30 L350,30 L350,50"/>
    <path d="M370,30 L370,50 L350,50"/>
    <path d="M30,570 L50,570 L50,550"/>
    <path d="M30,570 L30,550 L50,550"/>
    <path d="M370,570 L350,570 L350,550"/>
    <path d="M370,570 L370,550 L350,550"/>
  </g>

  <!-- Cave opening -->
  <g transform="translate(200,310)" opacity="0.15">
    <path d="M-50,40 Q-50,-20 0,-40 Q50,-20 50,40" fill="#1a1510" stroke="#d4a574" stroke-width="1"/>
    <!-- Inner cave darkness -->
    <path d="M-35,40 Q-35,-8 0,-25 Q35,-8 35,40" fill="#0d0a05"/>
    <!-- Light ray from opening -->
    <path d="M-5,-25 L-15,40 L15,40 L5,-25Z" fill="#d4a574" opacity="0.06"/>
  </g>

  <!-- Scrolls inside cave -->
  <g transform="translate(200,330)" opacity="0.2" fill="#d4a574">
    <rect x="-25" y="-5" width="8" height="20" rx="4"/>
    <rect x="-12" y="-8" width="8" height="24" rx="4"/>
    <rect x="2" y="-3" width="8" height="18" rx="4"/>
    <rect x="15" y="-6" width="8" height="22" rx="4"/>
  </g>

  <!-- Scattered Chinese/script characters suggestion -->
  <g opacity="0.05" fill="#d4a574" font-family="Georgia, serif" font-size="14">
    <text x="60" y="400" transform="rotate(-15,60,400)">&#x5929;</text>
    <text x="120" y="420" transform="rotate(10,120,420)">&#x5730;</text>
    <text x="280" y="395" transform="rotate(-8,280,395)">&#x4EBA;</text>
    <text x="320" y="425" transform="rotate(12,320,425)">&#x6587;</text>
    <text x="180" y="440" transform="rotate(-5,180,440)">&#x66F8;</text>
  </g>

  <!-- Diamond Sutra symbol -->
  <g transform="translate(200,385)" opacity="0.12" stroke="#d4a574" stroke-width="1" fill="none">
    <rect x="-20" y="-12" width="40" height="24" rx="1"/>
    <line x1="-15" y1="-6" x2="15" y2="-6" opacity="0.5"/>
    <line x1="-15" y1="0" x2="15" y2="0" opacity="0.5"/>
    <line x1="-15" y1="6" x2="15" y2="6" opacity="0.5"/>
  </g>

  <text x="200" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d4a574" letter-spacing="3" opacity="0.8">THE THOUSAND LI OF SHADOWS</text>
  <line x1="60" y1="77" x2="340" y2="77" stroke="#d4a574" stroke-width="0.5" opacity="0.4"/>

  <text x="200" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#d4a574" letter-spacing="6" opacity="0.5">BOOK THREE</text>

  <text x="200" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#f0e6d8" letter-spacing="2">THE</text>
  <text x="200" y="203" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#f0e6d8" letter-spacing="1">CAVE OF TEN</text>
  <text x="200" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#f0e6d8" letter-spacing="1">THOUSAND</text>
  <text x="200" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#f0e6d8" letter-spacing="2">SCROLLS</text>

  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#d4a574" letter-spacing="3" opacity="0.7">843 — 1006 CE</text>
  <text x="200" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#d4a574" letter-spacing="2" opacity="0.5">DUNHUANG</text>

  <line x1="120" y1="535" x2="280" y2="535" stroke="#d4a574" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="558" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#f0e6d8" letter-spacing="4" opacity="0.9">TUONG DO</text>

  <rect x="0" y="0" width="6" height="600" fill="rgba(0,0,0,0.3)" rx="4 0 0 4"/>
</svg>
