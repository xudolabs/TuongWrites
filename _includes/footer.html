<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <p class="footer-name">{{ site.title }}</p>
        <p class="footer-tagline">{{ site.description }}</p>
      </div>
      <div class="footer-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/books/' | relative_url }}">Books</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        {% if site.author_info.linkedin %}
        <a href="{{ site.author_info.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        {% endif %}
        {% if site.author_info.website %}
        <a href="{{ site.author_info.website }}" target="_blank" rel="noopener">Author Website</a>
        {% endif %}
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.author }}. All rights reserved.</p>
    </div>
  </div>
</footer>
